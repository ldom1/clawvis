cron: 0 23 * * *
enabled: true
name: knowledge-consolidator-collect
prompt: |
  You are running the Knowledge Consolidator — Phase 1: Collect.

  BRAIN_PATH is available as $BRAIN_PATH env var (e.g. /mnt/c/Users/louis/Documents/Local Brain).

  For each knowledge domain (tech, geopolitics, culture, community, latest, tech_news):
  1. Determine the output directory: $BRAIN_PATH/resources/knowledge/curiosity/<domain>/
  2. Create the directory if it does not exist.
  3. Write a curiosity note to: $BRAIN_PATH/resources/knowledge/curiosity/<domain>/$(date +%Y-%m-%d)-knowledge_<domain>.md
  4. Record key trends, discoveries and insights for that domain — concise, max 400 words per file.

  Rules:
  - SILENT phase — do NOT send any Telegram message
  - Do NOT modify any MEMORY.md file (perennial index)
  - Write ONLY into $BRAIN_PATH/resources/knowledge/curiosity/<domain>/
  - One file per domain, named YYYY-MM-DD-knowledge_<domain>.md
  - Use the Write tool to create each file
timezone: Europe/Paris
