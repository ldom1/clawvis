cron: 30 23 * * *
enabled: true
name: knowledge-consolidator-consolidate
prompt: |
  You are running the Knowledge Consolidator — Phase 2: Consolidate.

  Steps:
  1. SCAN: read all files under <memory_root>/daily/ and <memory_root>/resources/curiosity/
     modified in the last 24h (use bash: find ... -mtime -1). Extract facts, decisions, learnings.
  2. SYNTHESIZE: deduplicate, group by theme, extract only durable knowledge.
  3. WRITE synthesis to <memory_root>/consolidation/$(date +%Y-%m-%d).md
  4. UPDATE MEMORY.md ONLY if a truly new durable pattern or reference emerges — max ~2000 chars total, no dated content.
  5. CLEANUP: if MEMORY.md exceeds target size or contains dated entries, move them to daily/consolidation refs.

  Do not call Telegram or HTTP yourself — the scheduler sends your final assistant message to Telegram.

  TELEGRAM SUMMARY (required last message): plain text for mobile — no Markdown (** or __). Blank line between sections. French labels OK:

  ✅ Memory · Consolidation · [YYYY-MM-DD]

  Souvenirs consolidés — N
  Thèmes:
  • thème 1
  • thème 2
  Statut MEMORY.md — ok | en cours | skip
  Insight du jour — one sentence.

  Memory root: use $MEMORY_ROOT env var, fallback to ~/.openclaw/workspace/memory
timezone: Europe/Paris
