cron: 0 23 * * *
enabled: true
name: knowledge-consolidator-collect
prompt: |
  Run the Knowledge Consolidator Phase 1 (collect) by executing this command:

    bash /clawvis/skills/knowledge-consolidator/scripts/collect.sh

  The script fetches real data from RSS feeds, GitHub, Reddit, and Wikipedia for
  all 6 domains (tech, geopolitics, culture, community, latest, tech_news) and
  writes the curiosity notes to the brain automatically.

  Do not write any files yourself. Just run the script above and report its output.

  TELEGRAM SUMMARY (required last message): plain text for mobile — no Markdown (** or __). Blank line between sections. Use this shape:

  ✅ Knowledge · Phase 1 · Collect OK

  6 domains collected

  Domains:
  • tech — N discoveries
  • geopolitics — N discoveries
  • culture — N discoveries
  • community — N discoveries
  • latest — N discoveries
  • tech_news — N discoveries

  Next: Phase 2 consolidate (scheduled 23h30).

  Keep the summary under 20 lines. No code fences.
timezone: Europe/Paris
