server {
  listen 80;
  listen [::]:80 ipv6only=on;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Hub UI is at / — not /hub/ (legacy bookmarks).
  location = /hub {
    return 301 /;
  }
  location ^~ /hub/ {
    rewrite ^/hub/(.*)$ /$1 permanent;
  }

  # Docker's internal DNS resolver — defers hostname resolution to request time
  # so nginx starts cleanly even when kanban-api / hub-memory-api aren't up yet.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # set must come BEFORE rewrite...break because `break` halts all
  # ngx_http_rewrite_module directives (including set) that follow it.

  # Legacy Kanban API prefix (kept for backward compat)
  location /api/kanban/ {
    set $up_kanban_legacy http://kanban-api:8090;
    rewrite ^/api/kanban/(.*)$ /$1 break;
    proxy_pass $up_kanban_legacy;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
  }

  # Kanban API — domain prefix
  location /api/hub/kanban/ {
    set $up_kanban http://kanban-api:8090;
    rewrite ^/api/hub/kanban/(.*)$ /$1 break;
    proxy_pass $up_kanban;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
  }

  # Setup API (skills/memory sync)
  location /api/hub/setup/ {
    set $up_kanban http://kanban-api:8090;
    rewrite ^/api/hub/setup/(.*)$ /setup/$1 break;
    proxy_pass $up_kanban;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
  }

  # Chat domain — alias for agent service (used by Playwright tests + future chat API)
  location /api/hub/chat/ {
    set $up_chat http://agent-service:8092;
    rewrite ^/api/hub/chat/(.*)$ /$1 break;
    proxy_pass $up_chat;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Connection '';
    proxy_http_version 1.1;
    proxy_read_timeout 120s;
  }

  # Agent Service — streaming chat + openclaw sessions
  location /api/hub/agent/ {
    set $up_agent http://agent-service:8092;
    rewrite ^/api/hub/agent/(.*)$ /$1 break;
    proxy_pass $up_agent;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Force streaming: disable proxy buffering at multiple nginx layers.
    # SSE streaming — disable buffering
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header X-Accel-Buffering no;
    proxy_set_header Accept-Encoding "";
    proxy_set_header Connection '';
    proxy_http_version 1.1;
    proxy_read_timeout 120s;
  }

  # Hub Memory API (Brain / Quartz)
  location /api/hub/memory/ {
    set $up_memory http://hub-memory-api:8091;
    rewrite ^/api/hub/memory/(.*)$ /$1 break;
    proxy_pass $up_memory;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
  }

  # PoC apps: /apps/<slug>/ → PROJECTS_ROOT/<slug>/ (bind-mount /clawvis/projects-root in Docker)
  # Prefer dist/ over dev index.html; missing app → hub placeholder page.
  location /apps/ {
    rewrite ^/apps/(.*)$ /$1 break;
    root /clawvis/projects-root;
    index index.html;
    try_files $uri $uri/dist/index.html $uri/index.html @app_not_found;
  }

  location @app_not_found {
    root /usr/share/nginx/html;
    try_files /optional-app-placeholder/index.html /index.html =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
