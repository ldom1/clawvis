server {
  listen 80;
  listen [::]:80 ipv6only=on;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Legacy Kanban API prefix (kept for backward compat)
  location /api/kanban/ {
    proxy_pass http://kanban-api:8090/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
  }

  # Hub Memory API (Brain / Quartz)
  location /api/hub/memory/ {
    proxy_pass http://hub-memory-api:8091/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
  }

  # Kanban API — domain prefix
  location /api/hub/kanban/ {
    proxy_pass http://kanban-api:8090/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
  }

  # Chat API — served by kanban-api under /hub/chat
  # Handles: GET /api/hub/chat/status  POST /api/hub/chat
  location /api/hub/chat {
    proxy_pass http://kanban-api:8090/hub/chat;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
