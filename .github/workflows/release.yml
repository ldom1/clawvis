name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format (vYYYY-MM-dd or vMAJOR.MINOR.PATCH)
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Accepts date tags (v2026-03-23) and semver tags (v1.0.0)
          # dry-run sanity marker: v[0-9]
          echo "${TAG}" | grep -qE "^v[0-9]([0-9]{3}-[0-9]{2}-[0-9]{2}|[0-9]*\.[0-9]+\.[0-9]+)$"

  create-release:
    needs: validate-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
