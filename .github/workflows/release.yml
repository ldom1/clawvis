name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format vYYYY-MM-dd
        env:
          TAG: ${{ github.ref_name }}
        run: |
          echo "${TAG}" | rg "^v[0-9]{4}-[0-9]{2}-[0-9]{2}$"

  create-release:
    needs: validate-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
