name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack (Yarn Berry 4)
        run: corepack enable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Validate shell scripts
        run: |
          bash -n scripts/start.sh
          bash -n scripts/start-for-e2e.sh
          bash -n scripts/deploy.sh
          bash -n scripts/upgrade.sh
          bash -n scripts/setup-quartz.sh
          bash -n scripts/setup-runtime.sh
          bash -n clawvis
          bash -n install.sh
          bash -n get.sh
          bash -n scripts/init-memory.sh
          bash -n scripts/lifecycle.sh
          bash -n scripts/hub-healthcheck.sh
          bash -n scripts/transcribe-audio.sh
          bash -n tests/ci-playwright.sh
          bash -n tests/test-get-sh.sh

      - name: get.sh install smoke (workspace copy + install.sh)
        run: |
          chmod +x tests/test-get-sh.sh
          bash tests/test-get-sh.sh --workspace --run-mode prod
          bash tests/test-get-sh.sh --workspace --run-mode dev
          bash tests/test-get-sh.sh --workspace --run-mode minimal

      - name: get.sh clone smoke (local repo via CLAWVIS_REPO_URL)
        run: bash tests/test-get-sh.sh --clone --run-mode prod

      - name: Run Clawvis global test suite
        run: |
          chmod +x tests/ci-*.sh
          bash tests/ci-all.sh

      - name: License check
        run: |
          test -f LICENSE
          grep -q "^MIT License$" LICENSE
          grep -q "^Permission is hereby granted, free of charge" LICENSE
