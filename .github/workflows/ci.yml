name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: "hub/yarn.lock"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Validate shell scripts
        run: |
          bash -n scripts/start.sh
          bash -n scripts/deploy.sh
          bash -n scripts/upgrade.sh
          bash -n clawvis
          bash -n install.sh
          bash -n get.sh
          bash -n scripts/init-memory.sh
          bash -n scripts/lifecycle.sh

      - name: Run Clawvis global test suite
        run: |
          chmod +x tests/ci-*.sh
          bash tests/ci-all.sh

      - name: License check
        run: |
          test -f LICENSE
          grep -q "^MIT License$" LICENSE
          grep -q "^Permission is hereby granted, free of charge" LICENSE
