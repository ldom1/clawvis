name: Release Dry Run

on:
  pull_request:

jobs:
  validate-future-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate simulated release tag formats
        run: |
          # date tag
          echo "v2026-03-23" | grep -qE "^v[0-9]([0-9]{3}-[0-9]{2}-[0-9]{2}|[0-9]*\.[0-9]+\.[0-9]+)$"
          # semver tag
          echo "v1.0.0"      | grep -qE "^v[0-9]([0-9]{3}-[0-9]{2}-[0-9]{2}|[0-9]*\.[0-9]+\.[0-9]+)$"

      - name: Validate release workflow regex
        run: |
          test -f .github/workflows/release.yml
          grep -qE "v\[0-9\]" .github/workflows/release.yml
