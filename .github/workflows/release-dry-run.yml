name: Release Dry Run

on:
  pull_request:

jobs:
  validate-future-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate simulated release tag format
        env:
          FUTURE_TAG: v2026-03-23
        run: |
          echo "${FUTURE_TAG}" | grep -qE "^v[0-9]{4}-[0-9]{2}-[0-9]{2}$"

      - name: Validate release workflow regex
        run: |
          test -f .github/workflows/release.yml
          grep -q "v\\\[0-9\\\]" .github/workflows/release.yml
