name: License Check

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  mit-license:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure LICENSE is MIT
        run: |
          test -f LICENSE
          rg "^MIT License$" LICENSE
          rg "^Permission is hereby granted, free of charge" LICENSE
