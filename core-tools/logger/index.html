<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabOS Logs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09090b; --surface: #18181b; --surface2: #0f0f12; --border: #27272a;
      --text: #fafafa; --muted: #71717a; --accent: #6366f1;
      --green: #22c55e; --amber: #f59e0b; --red: #ef4444; --blue: #3b82f6; --cyan: #06b6d4;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; -webkit-font-smoothing: antialiased; }

    .layout { max-width: 1400px; margin: 0 auto; padding: 1.25rem 1.5rem; }

    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.75rem; }
    .top-bar h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 0.5rem; }
    .top-bar h1 svg { width: 20px; height: 20px; color: var(--accent); }
    .top-bar h1 a { color: var(--muted); text-decoration: none; font-size: 0.75rem; font-weight: 400; margin-left: 0.75rem; }
    .top-bar h1 a:hover { color: var(--accent); }

    .controls { display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap; }
    select, button, input {
      font-family: inherit; font-size: 0.78rem; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      padding: 0.4rem 0.65rem; outline: none; transition: border-color 0.2s;
    }
    select:focus, input:focus { border-color: var(--accent); }
    button { cursor: pointer; font-weight: 500; transition: all 0.15s; }
    button:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { opacity: 0.85; color: #fff; }

    .summary-bar {
      display: flex; gap: 1rem; margin-bottom: 0.75rem; flex-wrap: wrap;
      padding: 0.6rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; font-size: 0.78rem;
    }
    .summary-item { display: flex; align-items: center; gap: 0.3rem; }
    .summary-item .dot { width: 8px; height: 8px; border-radius: 50%; }
    .summary-item span:last-child { font-weight: 600; }

    .log-table-wrap {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      overflow-x: auto; overflow-y: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.78rem; min-width: 720px; }
    thead { background: var(--surface2); }
    th { text-align: left; padding: 0.6rem 0.75rem; color: var(--muted); font-weight: 600;
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); }
    td { padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: rgba(99,102,241,0.04); }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; }
    .ts { color: var(--muted); white-space: nowrap; }

    .level { display: inline-block; padding: 0.15rem 0.45rem; border-radius: 4px; font-weight: 600; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .level-DEBUG { background: rgba(99,102,241,0.15); color: var(--accent); }
    .level-INFO { background: rgba(34,197,94,0.15); color: var(--green); }
    .level-WARNING { background: rgba(245,158,11,0.15); color: var(--amber); }
    .level-ERROR { background: rgba(239,68,68,0.15); color: var(--red); }
    .level-CRITICAL { background: rgba(239,68,68,0.3); color: #fca5a5; }

    .process-badge { display: inline-block; padding: 0.12rem 0.4rem; border-radius: 4px; font-size: 0.68rem; background: rgba(6,182,212,0.12); color: var(--cyan); }
    .action-badge { color: var(--muted); font-size: 0.72rem; }
    .msg { max-width: 500px; word-break: break-word; }
    .meta { color: var(--muted); font-size: 0.68rem; margin-top: 0.2rem; }

    .empty-state { padding: 3rem; text-align: center; color: var(--muted); }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 1rem; opacity: 0.3; }

    .status-bar { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; padding: 0.4rem 0.75rem; font-size: 0.7rem; color: var(--muted); }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    @media (max-width: 900px) {
      .layout { padding: 1rem; }
      .top-bar { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
      .top-bar h1 { font-size: 1.1rem; }
      .controls { width: 100%; justify-content: flex-start; }
      .summary-bar { padding: 0.5rem 0.75rem; font-size: 0.74rem; }
      table { font-size: 0.74rem; }
    }
  </style>
</head>
<body>
<div class="layout">
  <div class="top-bar">
    <h1>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      LabOS Logs
      <a href="/">LabOS</a>
    </h1>
    <div class="controls">
      <select id="filter-level">
        <option value="">All Levels</option>
        <option value="DEBUG">DEBUG</option>
        <option value="INFO">INFO</option>
        <option value="WARNING">WARNING</option>
        <option value="ERROR">ERROR</option>
        <option value="CRITICAL">CRITICAL</option>
      </select>
      <select id="filter-process">
        <option value="">All Processes</option>
      </select>
      <input type="text" id="filter-search" placeholder="Search..." style="width: 160px;">
      <button class="btn-primary" onclick="fetchLogs()">Refresh</button>
      <button id="btn-auto" onclick="toggleAuto()">Auto: OFF</button>
    </div>
  </div>

  <div class="summary-bar" id="summary-bar">
    <div class="summary-item"><div class="dot" style="background:var(--green)"></div><span>INFO</span><span id="s-info">0</span></div>
    <div class="summary-item"><div class="dot" style="background:var(--amber)"></div><span>WARN</span><span id="s-warn">0</span></div>
    <div class="summary-item"><div class="dot" style="background:var(--red)"></div><span>ERROR</span><span id="s-error">0</span></div>
    <div class="summary-item"><div class="dot" style="background:var(--accent)"></div><span>Total</span><span id="s-total">0</span></div>
  </div>

  <div class="log-table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:140px">Timestamp</th>
          <th style="width:80px">Level</th>
          <th style="width:130px">Process</th>
          <th style="width:60px">Model</th>
          <th style="width:120px">Action</th>
          <th>Message</th>
        </tr>
      </thead>
      <tbody id="log-body">
        <tr><td colspan="6" class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <div>Loading logs...</div>
        </td></tr>
      </tbody>
    </table>
  </div>

  <div class="status-bar">
    <div class="live-dot" id="live-dot" style="display:none"></div>
    <span id="status-text">Fetching...</span>
  </div>
</div>

<script>
const API = '/api/kanban/logs';
let autoRefresh = false;
let autoTimer = null;
const knownProcesses = new Set();

async function fetchLogs() {
  const level = document.getElementById('filter-level').value;
  const process = document.getElementById('filter-process').value;
  const search = document.getElementById('filter-search').value;
  const params = new URLSearchParams();
  if (level) params.set('level', level);
  if (process) params.set('process', process);
  if (search) params.set('search', search);
  params.set('limit', '500');

  try {
    const [logsRes, summaryRes] = await Promise.all([
      fetch(`${API}?${params}`),
      fetch(`${API}/summary`)
    ]);
    const logsText = await logsRes.text();
    const summaryText = await summaryRes.text();
    if (!logsRes.ok || !summaryRes.ok || logsText.trim().startsWith('<')) {
      document.getElementById('status-text').textContent = 'Logs API unavailable — check that the hub started the Kanban API (:8090).';
      renderLogs([]);
      renderSummary({ total: 0, by_level: {}, by_process: {}, recent_errors: [] });
      return;
    }
    const logsData = JSON.parse(logsText);
    const summaryData = JSON.parse(summaryText);
    renderLogs(logsData.logs || []);
    renderSummary(summaryData);
    const now = new Date();
    const ts = now.toLocaleString(undefined, {
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
    });
    document.getElementById('status-text').textContent = `${logsData.count || 0} entries shown — ${ts}`;
  } catch (e) {
    document.getElementById('status-text').textContent = `Error: ${e.message}`;
  }
}

function renderLogs(logs) {
  const tbody = document.getElementById('log-body');
  if (!logs.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><div>No logs found</div></td></tr>';
    return;
  }
  const processSelect = document.getElementById('filter-process');
  logs.forEach(l => {
    if (l.process && !knownProcesses.has(l.process)) {
      knownProcesses.add(l.process);
      const opt = document.createElement('option');
      opt.value = l.process;
      opt.textContent = l.process;
      processSelect.appendChild(opt);
    }
  });

  tbody.innerHTML = logs.map(l => {
    const ts = (l.timestamp || '').replace('T', ' ').slice(0, 19);
    const meta = l.metadata && Object.keys(l.metadata).length
      ? `<div class="meta">${Object.entries(l.metadata).map(([k,v]) => `${k}=${typeof v === 'object' ? JSON.stringify(v) : v}`).join(', ')}</div>`
      : '';
    const modelShort = (l.model || '-').replace('anthropic/', '').replace('mistral/', '');
    return `<tr>
      <td class="mono ts">${ts}</td>
      <td><span class="level level-${l.level}">${l.level}</span></td>
      <td><span class="process-badge">${l.process || '-'}</span></td>
      <td class="mono" style="font-size:0.68rem;color:var(--muted)">${modelShort}</td>
      <td class="action-badge mono">${l.action || '-'}</td>
      <td class="msg">${escapeHtml(l.message || '')}${meta}</td>
    </tr>`;
  }).join('');
}

function renderSummary(s) {
  document.getElementById('s-info').textContent = s.by_level?.INFO || 0;
  document.getElementById('s-warn').textContent = s.by_level?.WARNING || 0;
  document.getElementById('s-error').textContent = (s.by_level?.ERROR || 0) + (s.by_level?.CRITICAL || 0);
  document.getElementById('s-total').textContent = s.total || 0;
}

function toggleAuto() {
  autoRefresh = !autoRefresh;
  const btn = document.getElementById('btn-auto');
  const dot = document.getElementById('live-dot');
  btn.textContent = `Auto: ${autoRefresh ? 'ON' : 'OFF'}`;
  dot.style.display = autoRefresh ? 'block' : 'none';
  if (autoRefresh) {
    autoTimer = setInterval(fetchLogs, 10000);
  } else {
    clearInterval(autoTimer);
  }
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

fetchLogs();
</script>
</body>
</html>
