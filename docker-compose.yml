# Clawvis — Full stack
# See ARCHITECTURE.md for full design

version: '3.9'

services:
  hub:
    build: ./hub
    ports:
      - "${HUB_PORT:-8088}:80"
    env_file: .env
    tmpfs:
      - /tmp
    labels:
      - "app=clawvis"
    depends_on:
      - kanban-api
      - hub-memory-api

  kanban-api:
    build:
      context: .
      dockerfile: kanban/Dockerfile
    ports:
      - "${KANBAN_API_PORT:-8090}:8090"
    env_file: .env
    volumes:
      - ./instances:/clawvis/instances
    environment:
      - MEMORY_ROOT=instances/${INSTANCE_NAME:-example}/memory
      # OpenClaw: set OPENCLAW_BASE_URL to reach your OpenClaw instance.
      # Same-host deployment (OpenClaw on the VPS alongside Clawvis):
      #   OPENCLAW_BASE_URL=http://host.docker.internal:3333
      # OpenClaw as a Docker service in this compose (see openclaw service below):
      #   OPENCLAW_BASE_URL=http://openclaw:3333
      - OPENCLAW_BASE_URL=${OPENCLAW_BASE_URL:-}
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY:-}
      - PRIMARY_AI_PROVIDER=${PRIMARY_AI_PROVIDER:-}
    # Allow reaching OpenClaw running on the Docker host (same VPS, different process)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    labels:
      - "app=clawvis"

  hub-memory-api:
    build:
      context: .
      dockerfile: kanban/Dockerfile
    ports:
      - "${HUB_MEMORY_API_PORT:-8091}:8091"
    env_file: .env
    volumes:
      - ./instances:/clawvis/instances
      - ./quartz:/clawvis/quartz
    environment:
      - MEMORY_ROOT=instances/${INSTANCE_NAME:-example}/memory
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    labels:
      - "app=clawvis"
    command:
      [
        "/clawvis/kanban/.venv/bin/uvicorn",
        "hub_core.memory_api:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8091",
      ]

  memory:
    image: ghcr.io/logseq/logseq-webapp:latest
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "${MEMORY_PORT:-3099}:8080"
    environment:
      - TZ=${TZ:-UTC}

  hub-vite:
    image: node:22-alpine
    profiles: ["dev"]
    working_dir: /app/hub
    command: sh -c "corepack enable && yarn install --immutable && yarn dev --host 0.0.0.0 --port ${HUB_VITE_PORT:-5173}"
    volumes:
      - ./:/app
    ports:
      - "${HUB_VITE_PORT:-5173}:${HUB_VITE_PORT:-5173}"
    env_file: .env

  # OpenClaw — optional: uncomment if you want to run OpenClaw alongside Clawvis
  # in the same compose stack. Set OPENCLAW_BASE_URL=http://openclaw:3333 above.
  # openclaw:
  #   image: ${OPENCLAW_IMAGE:-ghcr.io/open-claw/openclaw:latest}
  #   ports:
  #     - "${OPENCLAW_PORT:-3333}:3333"
  #   environment:
  #     - OPENCLAW_API_KEY=${OPENCLAW_API_KEY:-}
  #   labels:
  #     - "app=clawvis"
