# Clawvis — Full stack
# See ARCHITECTURE.md for full design

services:
  hub:
    container_name: clawvis-${INSTANCE_NAME:-example}-hub
    build: ./hub
    ports:
      # HUB_HOST=127.0.0.1 (default) = localhost-only; HUB_HOST=0.0.0.0 = LAN/Tailscale without host nginx
      - "${HUB_HOST:-127.0.0.1}:${HUB_PORT:-8088}:80"
    env_file: .env
    environment:
      - INSTANCE_NAME=${INSTANCE_NAME:-example}
    volumes:
      - ./instances:/clawvis/instances:ro
      - "${PROJECTS_ROOT:?Set PROJECTS_ROOT in .env}:/clawvis/projects-root:ro"
    tmpfs:
      - /tmp
    labels:
      - "app=clawvis"
    depends_on:
      kanban-api:
        condition: service_healthy
      hub-memory-api:
        condition: service_healthy
      agent-service:
        condition: service_healthy
      telegram:
        condition: service_started
      scheduler:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  kanban-api:
    container_name: clawvis-${INSTANCE_NAME:-example}-kanban-api
    build:
      context: .
      dockerfile: services/kanban/Dockerfile
    ports:
      - "127.0.0.1:${KANBAN_API_PORT:-8090}:8090"
    env_file: .env
    volumes:
      # Full repo RW so setup API can sync skills/ and .claude/ (host checkout replaces /clawvis).
      - .:/clawvis:rw
      - ./logs:/logs:rw
      # Kanban scans PROJECTS_ROOT from .env — bind the host folder at the same path.
      # RW: POST /hub/projects mkdir + git init + template files (RO mount → 500, Hub alert "Creation impossible").
      - "${PROJECTS_ROOT:?Set PROJECTS_ROOT in .env}:${PROJECTS_ROOT}:rw"
      # Claude Code on the host reads ~/.claude — mount it so MCP sync + skills symlink hit the host.
      - "${HOME}/.claude:/clawvis-host-claude:rw"
      # Local Brain (BRAIN_PATH) — rw so kanban tasks.json can be written back to the vault.
      - "${BRAIN_PATH}:${BRAIN_PATH}:rw"
    environment:
      - CLAWVIS_ROOT=/clawvis
      - CLAWVIS_HOST_CLAUDE_DIR=/clawvis-host-claude
      # Host path to this repo so ~/.claude/skills → <host>/clawvis/skills (compose expands ${PWD} on the host).
      - CLAWVIS_REPO_HOST_PATH=${PWD}
      - UV_CACHE_DIR=/tmp/uv-cache
      - HOME=/home/${USER}
      - MEMORY_ROOT=${BRAIN_PATH}
      - CENTRAL_LOG_FILE=/logs/message-trajectory.jsonl
      - PRIMARY_AI_PROVIDER=${PRIMARY_AI_PROVIDER:-}
    # Allow reaching OpenClaw running on the Docker host (same VPS, different process)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    labels:
      - "app=clawvis"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "uv run --directory /clawvis/services/kanban python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/openapi.json', timeout=5)\"",
        ]
      interval: 15s
      timeout: 8s
      retries: 3
      start_period: 25s

  hub-memory-api:
    container_name: clawvis-${INSTANCE_NAME:-example}-hub-memory-api
    build:
      context: .
      dockerfile: services/kanban/Dockerfile
    ports:
      - "127.0.0.1:${HUB_MEMORY_API_PORT:-8091}:8091"
    env_file: .env
    volumes:
      - ./instances:/clawvis/instances
      - ./quartz:/clawvis/quartz
      - "${BRAIN_PATH}:${BRAIN_PATH}:ro"
    environment:
      - UV_CACHE_DIR=/tmp/uv-cache
      - MEMORY_ROOT=/clawvis/instances/${INSTANCE_NAME:-example}/workspace
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    labels:
      - "app=clawvis"
    command:
      [
        "uv",
        "run",
        "--directory",
        "/clawvis/services/kanban",
        "uvicorn",
        "kanban_api.memory_api:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8091",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "uv",
          "run",
          "--directory",
          "/clawvis",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/openapi.json', timeout=5)",
        ]
      interval: 15s
      timeout: 8s
      retries: 3
      start_period: 25s

  agent-service:
    container_name: clawvis-${INSTANCE_NAME:-example}-agent-service
    build:
      context: .
      dockerfile: services/agent/Dockerfile
    ports:
      - "127.0.0.1:${AGENT_PORT:-8092}:8092"
    env_file: .env
    volumes:
      - ./instances:/app/instances
      - ./logs:/logs:rw
      # Live PRIMARY_AI_PROVIDER for /agent/config (setup wizard updates repo .env without container recreate)
      - ./.env:/clawvis/.env:ro
      # Claude CLI runtime (for provider=cli): mount host binary tree + auth/config in matching HOME paths.
      - "${HOME}/.local:/home/${USER}/.local:ro"
      - "${HOME}/.claude:/home/${USER}/.claude:rw"
    environment:
      - CLAWVIS_DOTENV_PATH=/clawvis/.env
      - PRIMARY_AI_PROVIDER=${PRIMARY_AI_PROVIDER:-}
      - CLI_BIN=/home/${USER}/.local/bin/claude
      - HOME=/home/${USER}
      - UV_CACHE_DIR=/tmp/uv-cache
      - OPENCLAW_AVAILABLE=${OPENCLAW_AVAILABLE:-false}
      - SCHEDULER_URL=http://scheduler:8095
      - KANBAN_URL=http://kanban-api:8090
      - CENTRAL_LOG_FILE=/logs/message-trajectory.jsonl
    depends_on:
      kanban-api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    labels:
      - "app=clawvis"
    healthcheck:
      # Image has curl (not wget) from agent/Dockerfile apt install
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8092/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  hub-vite:
    container_name: clawvis-${INSTANCE_NAME:-example}-hub-vite
    image: node:22-alpine
    profiles: ["dev"]
    working_dir: /app/hub
    command: sh -c "corepack enable && yarn install --immutable && yarn dev --host 0.0.0.0 --port ${HUB_VITE_PORT:-5173}"
    volumes:
      - ./:/app
    ports:
      - "${HUB_VITE_PORT:-5173}:${HUB_VITE_PORT:-5173}"
    env_file: .env

  telegram:
    container_name: clawvis-${INSTANCE_NAME:-example}-telegram
    build:
      context: .
      dockerfile: services/telegram/Dockerfile
    volumes:
      - ./logs:/logs:rw
    ports:
      - "127.0.0.1:${TELEGRAM_SEND_PORT:-8094}:8094"
    env_file: .env
    environment:
      - AGENT_URL=http://agent-service:8092
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - CENTRAL_LOG_FILE=/logs/message-trajectory.jsonl
    depends_on:
      agent-service:
        condition: service_healthy
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    labels:
      - "app=clawvis"

  scheduler:
    container_name: clawvis-${INSTANCE_NAME:-example}-scheduler
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    env_file: .env
    environment:
      - AGENT_URL=http://agent-service:8092
      - TELEGRAM_URL=http://telegram:8094
      - SKILLS_DIR=/skills
      - CENTRAL_LOG_FILE=/logs/message-trajectory.jsonl
    volumes:
      - ./services/scheduler/definitions:/skills:rw
      - ./logs:/logs:rw
    depends_on:
      agent-service:
        condition: service_healthy
      telegram:
        condition: service_started
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    labels:
      - "app=clawvis"

  # OpenClaw — optional: uncomment if you want to run OpenClaw alongside Clawvis
  # in the same compose stack. Set OPENCLAW_BASE_URL=http://openclaw:3333 above.
  # openclaw:
  #   image: ${OPENCLAW_IMAGE:-ghcr.io/open-claw/openclaw:latest}
  #   ports:
  #     - "${OPENCLAW_PORT:-3333}:3333"
  #   environment:
  #     - OPENCLAW_API_KEY=${OPENCLAW_API_KEY:-}
  #   labels:
  #     - "app=clawvis"
