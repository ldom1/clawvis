# Clawvis — Full stack
# See ARCHITECTURE.md for full design

version: '3.9'

services:
  hub:
    build: ./hub
    ports:
      - "${HUB_PORT:-8088}:80"
    env_file: .env
    tmpfs:
      - /tmp
    labels:
      - "app=clawvis"
    depends_on:
      - kanban-api
      - hub-memory-api

  kanban-api:
    build:
      context: .
      dockerfile: kanban/Dockerfile
    ports:
      - "${KANBAN_API_PORT:-8090}:8090"
    env_file: .env
    volumes:
      - ./instances:/clawvis/instances
    environment:
      - MEMORY_ROOT=instances/${INSTANCE_NAME:-example}/memory
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    labels:
      - "app=clawvis"

  hub-memory-api:
    build:
      context: .
      dockerfile: kanban/Dockerfile
    ports:
      - "${HUB_MEMORY_API_PORT:-8091}:8091"
    env_file: .env
    volumes:
      - ./instances:/clawvis/instances
      - ./quartz:/clawvis/quartz
    environment:
      - MEMORY_ROOT=instances/${INSTANCE_NAME:-example}/memory
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    labels:
      - "app=clawvis"
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "hub_core.memory_api:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8091",
      ]

  memory:
    image: ghcr.io/logseq/logseq-webapp:latest
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "${MEMORY_PORT:-3099}:8080"
    environment:
      - TZ=${TZ:-UTC}

  hub-vite:
    image: node:22-alpine
    profiles: ["dev"]
    working_dir: /app/hub
    command: sh -c "corepack enable && yarn install --immutable && yarn dev --host 0.0.0.0 --port ${HUB_VITE_PORT:-5173}"
    volumes:
      - ./:/app
    ports:
      - "${HUB_VITE_PORT:-5173}:${HUB_VITE_PORT:-5173}"
    env_file: .env

  # openclaw: # coming in Phase Setup.1
