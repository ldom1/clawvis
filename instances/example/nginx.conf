# nginx.conf — Instance template
# Copy to instances/ldom/nginx/nginx.conf and customize
server {
    listen 80;
    server_name localhost;

    # Hub dashboard
    location / {
        root /srv/hub/public;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Kanban API
    location /api/kanban/ {
        proxy_pass http://localhost:8090/;
        proxy_buffering off;
        proxy_read_timeout 3600;
    }

    # hub-core API
    location /api/hub-core/ {
        proxy_pass http://localhost:8091/;
    }
}
