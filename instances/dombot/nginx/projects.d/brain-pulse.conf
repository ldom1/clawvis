# brain-pulse — static Vite build served at /apps/brain-pulse/
location ^~ /apps/brain-pulse/ {
    auth_request /internal/authelia/authz;
    error_page 401 = @authelia_redirection;
    alias /home/lgiron/Lab/project/brain-pulse/dist/;
    try_files $uri $uri/ /apps/brain-pulse/index.html;
    add_header Cache-Control "no-cache";
}
