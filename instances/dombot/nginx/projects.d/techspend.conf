# techspend — static Vite build served at /apps/techspend/
location ^~ /apps/techspend/ {
    auth_request /internal/authelia/authz;
    error_page 401 = @authelia_redirection;
    alias /home/lgiron/Lab/project/techspend/dist/;
    try_files $uri $uri/ /apps/techspend/index.html;
    add_header Cache-Control "no-cache";
}
