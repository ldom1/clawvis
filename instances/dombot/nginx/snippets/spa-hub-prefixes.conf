# Inclus depuis nginx.conf AVANT projects.d — priorité sur tout vieux `alias` public/{settings,kanban,...}
# Mêmes en-têtes que location / (Hub SPA unique).

# SPA à / — pas de préfixe /hub/. Redirige les bookmarks ; ^~ bat un `location /hub/` résiduel (alias → 500).
location = /hub {
    return 301 /;
}
location ^~ /hub/ {
    rewrite ^/hub/(.*)$ /$1 permanent;
}

location ^~ /settings {
    auth_request /internal/authelia/authz;
    error_page 401 = @authelia_redirection;
    proxy_pass http://clawvis_hub;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $lab_x_forwarded_proto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
}

