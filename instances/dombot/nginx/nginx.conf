# Clawvis — Dombot host nginx (edge :8088 → Hub container :8089).
# DO NOT use `alias …/instances/dombot/public/kanban/` for /kanban/ or /settings/
# — that bypasses the Vite SPA. All Hub UI must hit upstream clawvis_hub.
#
# Generate active config:
#   export LAB=/home/lgiron/Lab   # parent of clawvis repo (landing: $LAB/clawvis-landing/dist)
#   ./instances/dombot/scripts/render-nginx.sh
#
# Variables substituted: HUB_ROOT LAB OPENCLAW_GATEWAY_TOKEN

worker_processes auto;
error_log ${HUB_ROOT}/logs/nginx-error.log warn;
pid ${HUB_ROOT}/logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Évite /var/log/nginx/* (souvent non inscriptible pour un nginx lancé en user)
    access_log ${HUB_ROOT}/logs/nginx-access.log;
    error_log ${HUB_ROOT}/logs/nginx-error-http.log warn;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    client_max_body_size 64m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Bord public en HTTPS ; :8088 local est HTTP — défaut https pour le Hub et les logs.
    map $http_x_forwarded_proto $lab_x_forwarded_proto {
        "https" "https";
        "http"  "http";
        default "https";
    }

    upstream clawvis_hub {
        server 127.0.0.1:8089;
        keepalive 32;
    }

    # ── Marketing (no Authelia) ──────────────────────────────────────────
    server {
        listen 8088;
        server_name www.clawvis.fr clawvis.fr;
        root ${LAB}/clawvis-landing/dist;
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ── Lab (Authelia + full Hub SPA) ───────────────────────────────────
    server {
        listen 8088;
        server_name lab.dombot.tech;

        # TLS au bord ; :8088 est HTTP. Authelia ≥4.39 exige https dans X-Original-URL.
        # Ne pas forwarder les en-têtes client : un X-Forwarded-Proto: http du proxy amont
        # écrase la cible et Authelia répond 400 → nginx 500.
        location = /internal/authelia/authz {
            internal;
            # AuthRequest : Authelia 4.39+ résout l’URL du portail via session.cookies[].authelia_url ;
            # sans ça → « authelia url lookup failed ». Surcharge explicite (évite d’éditer la conf hors repo).
            proxy_pass http://127.0.0.1:9091/api/authz/auth-request?authelia_url=https://$host/authelia/;
            proxy_pass_request_headers off;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header X-Original-URL https://$host$request_uri;
            proxy_set_header X-Original-Method $request_method;
            proxy_set_header X-Forwarded-Method $request_method;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_set_header Content-Length "";
            proxy_pass_request_body off;
        }

        # Vite hashed assets (must be before generic /)
        location /assets/ {
            auth_request /internal/authelia/authz;
            error_page 401 = @authelia_redirection;
            proxy_pass http://clawvis_hub/assets/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $lab_x_forwarded_proto;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location ~ ^/(clawvis-mascot\.svg|favicon\.ico|favicon\.png)$ {
            auth_request /internal/authelia/authz;
            error_page 401 = @authelia_redirection;
            proxy_pass http://clawvis_hub$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=86400";
        }

        # Portail Authelia — PAS d'auth_request ici, sinon boucle infinie
        location /authelia/ {
            proxy_pass http://127.0.0.1:9091/authelia/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;  # nginx user lacks write access to /var/lib/nginx/proxy/
        }

        location /api/ {
            auth_request /internal/authelia/authz;
            error_page 401 = @authelia_redirection;
            proxy_pass http://clawvis_hub;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $lab_x_forwarded_proto;
            proxy_read_timeout 120s;
            proxy_buffering off;
            proxy_set_header Connection "";
        }

        # ^~ : priorité sur tout `alias` résiduel (ex. public/settings/) dans d’anciennes confs
        include ${HUB_ROOT}/nginx/snippets/spa-hub-prefixes.conf;

        include ${HUB_ROOT}/nginx/projects.d/*.conf;

        # Accueil et autres chemins Hub
        location / {
            auth_request /internal/authelia/authz;
            error_page 401 = @authelia_redirection;
            proxy_pass http://clawvis_hub;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $lab_x_forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location @authelia_redirection {
            internal;
            return 302 https://$host/authelia/?rd=https://$host$request_uri;
        }
    }
}
